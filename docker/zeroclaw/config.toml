# ZeroClaw Configuration File
# Optimized comments: Detailed per-field explanations, redundancies removed.
# Format: TOML. All values preserved; only comments optimized.

# API Configuration Section

# api_key: Primary API key for LLM providers (Zeroclaw core).
# Type: string. Default: "".
# Recommended: "" (inject via env ZEROCLAW_API_KEY in docker-compose.yml for security/secret mgmt).
# Reason: Avoids committing keys; Docker secrets best practice.
# Usage: Mandatory for non-local providers like zai-cn/moonshot.
api_key = ""

# default_provider: Default LLM provider for Zeroclaw requests.
# Type: string. Options: "zai-cn", "moonshot", "minimax", "deepseek", "ollama" (local), "openai", "anthropic", "google", "openrouter".
# Recommended: "zai-cn" (fast CN access, cost-effective for general use).
# Reason: Reliable default; fallback to ollama for offline/Docker.
# Usage: Global fallback.
default_provider = "zai-cn"

# default_model: Specific model within default_provider.
# Type: string. Options: Provider-dependent (e.g., "glm-4.7", "glm-5" for zai-cn).
# Recommended: "glm-4.7" (balanced intelligence/speed/cost).
# Reason: Optimal for Zeroclaw autonomy tasks.
# Usage: Override per-task if needed.
default_model = "glm-4.7"

# default_temperature: Controls creativity/randomness in LLM generation.
# Type: float. Range: 0.0 (deterministic) - 2.0 (highly random). Default: 0.4.
# Recommended: 0.3-0.5 (precision for code/docs/autonomy).
# Reason: Zeroclaw tasks favor reliability over creativity.
# Usage: Adjust lower for analysis, higher for brainstorming.
default_temperature = 0.4
embedding_routes = []
model_routes = []
provider_timeout_secs = 120

[model_providers]

[extra_headers]

[observability]
backend = "none"
runtime_trace_max_entries = 200
runtime_trace_mode = "none"
runtime_trace_path = "state/runtime-trace.jsonl"

[autonomy]
# level: Zeroclaw autonomy level (command execution freedom).
# Type: string. Options: "readonly" (observe only), "supervised" (human approve), "full" (independent).
# Recommended: "supervised" (safe balance for Docker/prod).
# Reason: Prevents runaway actions; full risky without monitoring.
# Usage: Start supervised, upgrade after trust.
level = "full"

# workspace_only: Confine actions to workspace dir (/app/workspace in Docker).
# Type: bool. Default: true.
# Recommended: true (essential sandboxing).
# Reason: Zeroclaw security principle; prevents host escapes.
# Usage: false only for trusted advanced setups.
workspace_only = true

# allowed_commands: Whitelisted shell commands.
# Type: array[string].
# Usage: Restrict exec for safety (e.g., resume processing).
allowed_commands = [
  "git",
  "ls",
  "cat",
  "grep",
  "echo",
  "pwd",
  "mkdir",
  "cp",
  "mv",
  "curl",
]

# forbidden_paths: Banned paths even in workspace.
# Type: array[string].
# Usage: Extra security layer.
forbidden_paths = [
  "/etc",
  "/root",
  "/proc",
  "/sys",
  "~/.ssh",
  "/var/run",
]

# max_actions_per_hour: Autonomy action rate limit (actions/hour).
# Type: integer. Default: 100. Range: 50-500.
# Recommended: 200 (moderate autonomy).
# Reason: Curbs abuse while allowing productivity.
# Usage: Lower for testing.
max_actions_per_hour = 100

# max_cost_per_day_cents: Daily cost limit (cents).
# Type: integer. Default: 1000 ($10).
# Usage: Auto-shutoff safety.
max_cost_per_day_cents = 1000

require_approval_for_medium_risk = false

block_high_risk_commands = false

allowed_roots = []
always_ask = []
auto_approve = [
  "file_read",
  "memory_recall",
]
non_cli_excluded_tools = []
shell_env_passthrough = []

[security.sandbox]
# backend: Sandbox isolation backend for Zeroclaw actions.
# Type: string. Options: "auto" (detect), "firejail", "bubblewrap".
# Recommended: "auto" (works in Docker/Alpine).
# Reason: Seamless Linux container security.
# Usage: firejail for host if no Docker.
backend = "auto"
# firejail_args: Custom args for firejail sandbox.
# Type: array[string]. Default: [].
# Recommended: [] (use defaults); add ["--net=none"] for no-network.
# Usage: Fine-tune isolation.
firejail_args = []

[security.resources]
max_cpu_time_seconds = 60
max_memory_mb = 512
max_subprocesses = 10
memory_monitoring = true

[security.audit]
# enabled: Enable audit trail for all Zeroclaw actions.
# Type: bool. Default: true.
# Recommended: true (compliance/debugging).
# Reason: Essential for security review in autonomous mode.
# Usage: Disable only for perf-critical local tests.
enabled = true

# log_path: Path for audit logs (Docker volume-mounted).
# Type: string. Default: "/zeroclaw-data/logs/audit.log".
# Recommended: "/zeroclaw-data/logs/audit.log" (persistent volume).
# Reason: Survives container restarts.
# Usage: Customize for log aggregation.
log_path = "/zeroclaw-data/logs/audit.log"

# max_size_mb: Auto-rotate log at size threshold (MB).
# Type: integer. Default: 50. Range: 10-500.
# Recommended: 100 (balance retention/perf).
# Usage: Prevents disk fill.
max_size_mb = 50

sign_events = false

