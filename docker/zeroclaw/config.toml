# =============================================================================
# ZeroClaw Configuration - Production Environment
# Optimized for: WSL2 / Docker Sidecar / Tailscale Private Network
# =============================================================================

# [API Configuration]
# SECURITY: Leave empty here; inject via ZEROCLAW_API_KEY environment variable in docker-compose.yml
api_key = ""

# Default LLM provider
# Options: "deepseek", "ollama" (local), "openai", "anthropic", "google"
default_provider = "deepseek"

# Target Model
# Options: "deepseek-chat" (standard), "deepseek-reasoner" (DeepSeek-R1 for complex logic)
default_model = "deepseek-chat"

# Generation Temperature (0.0 - 1.0)
# Use 0.3-0.4 for Documents (Fact-based/Precise); 0.7 for general tasks
default_temperature = 0.4

# =============================================================================
# [Gateway - Network Ingress]
# Defines how the Agent listens for incoming requests
# =============================================================================
[gateway]
# Host Address
# Set to "0.0.0.0" to allow Tailscale container to forward traffic to this app
host = "0.0.0.0"

# Service Port
port = 42617

# Security: Require initial pairing between client and server
require_pairing = true

# Allow Non-Localhost Binding
# MUST BE true in Docker to allow access via Tailscale IP/Hostname
allow_public_bind = true

# =============================================================================
# [Autonomy & Security - Operational Guardrails]
# =============================================================================
[autonomy]
# Level of Independence
# Options:
#   "readonly"   - View files only
#   "supervised" - Asks for permission before running Shell commands (Recommended)
#   "full"       - Fully autonomous execution
level = "supervised"

# Rate Limiting
max_actions_per_hour = 100
max_cost_per_day_cents = 1000  # Safety shut-off at $5.00/day

# Sandbox Mode
# Prevents the Agent from accessing files outside the /app/workspace directory
workspace_only = true

# Shell Command Whitelist (Restricted for Resume processing)
allowed_commands = ["git", "ls", "cat", "grep", "echo", "pwd", "mkdir", "cp", "mv"]

# Restricted System Paths (Even if within Workspace)
forbidden_paths = ["/etc", "/root", "/proc", "/sys", "~/.ssh", "/var/run"]

# =============================================================================
# [Memory & Privacy - Data Retention]
# =============================================================================
[memory]
# Storage Engine
# Options: "sqlite" (Local DB), "markdown" (Human-readable), "none"
backend = "sqlite"
auto_save = true

# Embedding (Vector Search)
# Options: "none" (Privacy First), "openai", "local"
# NOTE: Set to "none" to prevent your resume text from being uploaded to vector databases
embedding_provider = "none"

# =============================================================================
# [Provider Specifics - DeepSeek Tuning]
# =============================================================================
[providers.deepseek]
base_url = "https://api.deepseek.com/v1"

# Request Timeout in seconds (Increase for long resume analysis)
timeout = 60

# Rate Limit Control
max_concurrency = 3

# Proxy (Optional: Uncomment if WSL requires host proxy for outbound API calls)
# proxy_url = "http://host.docker.internal:7890"

# =============================================================================
# [Security - Advanced Protection]
# =============================================================================
[security]
# Prompt Leakage Protection (Injects secret tokens to track prompt injection attempts)
canary_tokens = true

[security.audit]
enabled = true
log_path = "/zeroclaw-data/logs/audit.log"
max_size_mb = 50

[security.url_access]
# Blocks API access to your local/private network addresses for safety
block_private_ip = true
# Whitelist Tailscale CIDR (100.64.0.0/10) to allow node-to-node communication
allow_cidrs = ["100.64.0.0/10"]
allow_loopback = true

[security.outbound_leak_guard]
# Automatically masks sensitive data (API Keys, SSH Keys) in AI responses
enabled = true
action = "redact"

# =============================================================================
# [Tunnel - External Access]
# IMPORTANT: Since you are using Tailscale via Docker Sidecar (Network Stack Sharing),
# internal Tunnel MUST be disabled to avoid conflict.
# =============================================================================
[tunnel]
provider = "none"

# =============================================================================
# [Storage - Database Configuration]
# =============================================================================
# Storage provider configuration
# Use [storage.sqlite] for SQLite or [storage.postgres] for PostgreSQL
[storage]

# =============================================================================
# [Storage - SQLite Configuration]
# =============================================================================
[storage.sqlite]
# Database file path (relative to data directory or absolute)
database_path = "zeroclaw.db"

# Connection timeout in seconds
connect_timeout_secs = 5

# WAL mode for better concurrency
wal_mode = true

# =============================================================================
# [Storage - PostgreSQL Configuration (commented out)]
# =============================================================================
# [storage.postgres]
# Database connection URL
# db_url = "postgres://user:pass@localhost/zeroclaw"

# Connection timeout in seconds
# connect_timeout_secs = 5

# =============================================================================
# [Web Search - Internet Search]
# =============================================================================
[web_search]
# Enable web search (default: true)
enabled = true

# Search provider: duckduckgo (default), brave
provider = "duckduckgo"

# Maximum results per search
max_results = 5

# Search timeout in seconds
timeout_secs = 15
