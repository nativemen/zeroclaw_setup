[memory]
# backend: Persistent storage for conversation memory/context.
# Type: string. Options: "sqlite" (structured), "markdown" (human-readable), "none".
# Recommended: "sqlite" (reliable for Docker persistence).
# Reason: Efficient querying; volume-mount db.
# Usage: markdown for transparency.
backend = "sqlite"

# auto_save: Automatically persist memory after sessions.
# Type: bool. Default: true.
# Recommended: true (lose nothing).
# Usage: false for ephemeral sessions.
archive_after_days = 7
auto_save = true
conversation_retention_days = 30
hygiene_enabled = true
purge_after_days = 30

# embedding_provider: Provider for semantic search embeddings.
# Type: string. Options: "none", "openai", "ollama/local".
# Recommended: "none" (privacy-focused Docker default).
# Reason: No external API calls/leakage; keyword fallback sufficient.
# Usage: openai if rich RAG needed.
auto_hydrate = true
chunk_max_tokens = 512
embedding_cache_size = 10000
embedding_dimensions = 1536
embedding_model = "text-embedding-3-small"
embedding_provider = "none"
keyword_weight = 0.3
min_relevance_score = 0.4
response_cache_enabled = false
response_cache_hot_entries = 256
response_cache_max_entries = 5000
response_cache_ttl_minutes = 60
snapshot_enabled = false
snapshot_on_hygiene = false
vector_weight = 0.7

[memory.qdrant]
collection = "zeroclaw_memories"

[storage.provider.config]
connect_timeout_secs = 5
provider = "sqlite"
schema = "public"
table = "memories"

[tunnel]
# provider: Secure tunnel for external connectivity.
# Type: string. Options: "none", "cloudflare", "ngrok".
# Recommended: "none" (use Tailscale Docker sidecar).
# Reason: No extra deps/conflicts; Tailscale VPN sufficient.
# Usage: Other for public expose.
provider = "none"

[gateway]
# port: HTTP port for Zeroclaw gateway (client connections).
# Type: integer. Default: 42617. Range: 1024-65535.
# Recommended: 42617 (Zeroclaw default).
# Reason: Avoids common port conflicts.
# Usage: Map in docker-compose to host/Tailscale.
port = 42617

# host: Bind interface for gateway listener.
# Type: string. Default: "0.0.0.0".
# Recommended: "0.0.0.0" (Docker/Tailscale required).
# Reason: Allows external access via Tailscale sidecar.
# Usage: "127.0.0.1" for loopback-only.
host = "0.0.0.0"

# require_pairing: Enforce client pairing before use.
# Type: bool. Default: true.
# Recommended: true (initial auth security).
# Reason: Protects against unauthorized access.
# Usage: false for open/internal networks.
require_pairing = true

# allow_public_bind: Allow non-localhost binds.
# Type: bool. Default: true.
# Recommended: true (mandatory for Docker+Tailscale).
# Reason: Gateway needs public exposure.
# Usage: false tightens security on localhost.
allow_public_bind = true
idempotency_max_keys = 10000
idempotency_ttl_secs = 300
pair_rate_limit_per_minute = 10
paired_tokens = []
rate_limit_max_keys = 10000
session_persistence = true
session_ttl_hours = 0
trust_forwarded_headers = false
webhook_rate_limit_per_minute = 60

