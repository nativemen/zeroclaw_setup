# ZeroClaw Configuration File
# Optimized comments: Detailed per-field explanations, redundancies removed.
# Format: TOML. All values preserved; only comments optimized.

# API Configuration Section

# api_key: API key for LLM providers.
# SECURITY: Leave empty; inject via environment variable
# (ZEROCLAW_API_KEY in docker-compose.yml).
# Type: string. Default: "".
# Usage: Required for paid providers.
api_key = ""

# default_provider: Default LLM provider.
# Type: string.
# Options: "zai", "moonshot", "minimax", "deepseek", "ollama" (local), "openai", "anthropic", "google", "openrouter".
# Default: "zai".
# Usage: Fallback provider for requests.
default_provider = "zai"

# default_model: Target model for generation.
# Type: string.
# Options: "glm-4.7", "glm-5", "glm-4.6".
# Default: "glm-4.7".
# Usage: Specific model within provider.
default_model = "glm-4.7"

# default_temperature: Sampling temperature for generation.
# Type: float. Range: 0.0-1.0. Default: 0.4.
# Usage: Lower (0.3-0.4) for precise/docs;
# higher (0.7) for creative tasks.
default_temperature = 0.4

[gateway]
# host: Bind address for incoming requests.
# Type: string. Default: "0.0.0.0".
# Usage: "0.0.0.0" allows Tailscale forwarding;
# "127.0.0.1" for localhost-only.
host = "0.0.0.0"

# port: Listening port.
# Type: integer. Default: 42617.
# Usage: Expose via Docker; access via Tailscale.
port = 42617

# require_pairing: Require client-server pairing.
# Type: bool. Default: true.
# Usage: Security feature for initial auth.
require_pairing = true

# allow_public_bind: Permit binding to non-localhost.
# Type: bool. Default: true.
# Usage: MUST be true in Docker for Tailscale access.
allow_public_bind = true

[autonomy]
# level: Autonomy mode.
# Type: string.
# Options: "readonly" (view only), "supervised" (ask permission, recommended),
# "full" (autonomous).
# Default: "supervised".
# Usage: Controls command execution independence.
level = "supervised"

# max_actions_per_hour: Rate limit on actions.
# Type: integer. Default: 100.
# Usage: Prevent abuse/overuse.
max_actions_per_hour = 100

# max_cost_per_day_cents: Daily cost limit (cents).
# Type: integer. Default: 1000 ($10).
# Usage: Auto-shutoff safety.
max_cost_per_day_cents = 1000

# workspace_only: Restrict to /app/workspace.
# Type: bool. Default: true.
# Usage: Sandboxing for security.
workspace_only = true

# allowed_commands: Whitelisted shell commands.
# Type: array[string].
# Usage: Restrict exec for safety (e.g., resume processing).
allowed_commands = ["git", "ls", "cat", "grep", "echo", "pwd", "mkdir", "cp", "mv"]

# forbidden_paths: Banned paths even in workspace.
# Type: array[string].
# Usage: Extra security layer.
forbidden_paths = ["/etc", "/root", "/proc", "/sys", "~/.ssh", "/var/run"]

[memory]
# backend: Memory storage.
# Type: string. Options: "sqlite" (local DB), "markdown" (readable), "none".
# Default: "sqlite".
# Usage: Persist conversation history.
backend = "sqlite"

# auto_save: Enable auto-save.
# Type: bool. Default: true.
# Usage: Save memory after interactions.
auto_save = true

# embedding_provider: Vector embedding for search.
# Type: string. Options: "none" (privacy), "openai", "local".
# Default: "none".
# Usage: "none" prevents external uploads (e.g., resume text).
embedding_provider = "none"

[security.audit]
# enabled: Audit logging.
# Type: bool. Default: true.
# Usage: Log actions for review.
enabled = true

# log_path: Audit log file.
# Type: string. Default: "/zeroclaw-data/logs/audit.log".
# Usage: Custom path in Docker volume.
log_path = "/zeroclaw-data/logs/audit.log"

# max_size_mb: Max log size (MB).
# Type: integer. Default: 50.
# Usage: Rotate when exceeded.
max_size_mb = 50

[tunnel]
# provider: Tunnel service.
# Type: string. Default: "none".
# Usage: "none" for Tailscale sidecar; avoids conflicts.
provider = "none"

[storage]
# Note: Configures DB storage. Use sub-tables like [storage.sqlite]
# or [storage.postgres].

# [storage.postgres] (example, commented)
# db_url: Postgres connection URL.
# Type: string.
# Example: "postgres://user:pass@localhost/zeroclaw".
# connect_timeout_secs: Connection timeout (s).
# Type: integer. Default: 5.

[web_search]
# enabled: Enable web search.
# Type: bool. Default: true.
# Usage: Allow agent internet searches.
enabled = true

# provider: Search engine.
# Type: string. Options: "duckduckgo" (default), "brave".
# Usage: Privacy-focused fallback.
provider = "duckduckgo"

# max_results: Results per query.
# Type: integer. Default: 5. Range: 1-20.
# Usage: Balance speed/relevance.
max_results = 5

# timeout_secs: Search timeout.
# Type: integer. Default: 15.
# Usage: Prevent hangs.
timeout_secs = 15
