[reliability]
# provider_retries: Max retries per provider call on failure.
# Type: integer. Default: 2. Range: 1-5.
# Recommended: 3 (robust w/o excess cost/latency).
# Reason: LLM APIs flaky; balances uptime/cost.
# Usage: Higher for unstable networks.
api_keys = []
channel_initial_backoff_secs = 2
channel_max_backoff_secs = 60
fallback_providers = []
provider_backoff_ms = 500
provider_retries = 2
scheduler_poll_secs = 15
scheduler_retries = 2

[reliability.model_fallbacks]

[scheduler]
# enabled: Enable Zeroclaw task scheduler (background jobs).
# Type: bool. Default: true.
# Recommended: true.
# Reason: Powers cron/heartbeat autonomy.
enabled = true

# max_concurrent: Max parallel tasks.
# Type: integer. Default: 4. Range: 1-8.
# Recommended: 2 (Docker resource-safe).
# Reason: Avoids CPU/memory thrashing in container.
# Usage: Increase on multi-core hosts.
max_concurrent = 4

# max_tasks: Max queued tasks.
# Type: integer. Default: 64. Range: 10-200.
# Recommended: 50 (queue control).
# Reason: Prevents backlog explosion.
max_tasks = 64

[agent]
# max_tool_iterations: Max loops in tool-use reasoning.
# Type: integer. Default: 10. Range: 5-20.
# Recommended: 8 (efficient).
# Reason: Prevents infinite loops; sufficient for complex tasks.
# Usage: Higher for deep workflows.
compact_context = false
max_context_tokens = 32000
max_history_messages = 50
max_tool_iterations = 10
parallel_tools = false
tool_call_dedup_exempt = []
tool_dispatcher = "auto"
tool_filter_groups = []

